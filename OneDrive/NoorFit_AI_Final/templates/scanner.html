<!DOCTYPE html>
<html>
<head>
<title>Food Scanner</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="nav">
  <span>FitBot</span>
  <button class="theme-btn" onclick="toggleTheme()">🌗</button>
</nav>

<div class="page-main">
  <h1>Food Scanner</h1>

  <input type="file" id="foodImage" accept="image/*">
  <img id="preview">
  <div id="scanResult" class="card" style="display:none"></div>
</div>

<script src="/static/js/scanner.js"></script>

<script>
function toggleTheme(){
  const t=document.body.getAttribute("data-theme")==="light"?"dark":"light";
  document.body.setAttribute("data-theme",t);
  localStorage.setItem("fitbot_theme",t);
}
document.body.setAttribute("data-theme",localStorage.getItem("fitbot_theme")||"dark");
</script>

</body>
</html>
